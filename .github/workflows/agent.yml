name: Base Wallet Agent

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      wallet:
        description: 'Wallet address to analyze'
        required: false
        default: ''

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install
        working-directory: agent

      - name: Run agent
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          AI_PROVIDER: ${{ secrets.AI_PROVIDER }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          WALLETS: ${{ secrets.WALLETS }}
          MANUAL_WALLET: ${{ inputs.wallet }}
        run: node index.js
        working-directory: agent

      - name: Commit report
        run: |
          git config user.name "Base Agent Bot"
          git config user.email "bot@base-agent"
          git pull origin main --rebase --autostash
          git add reports/
          git diff --staged --quiet || git commit -m "report: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin main
